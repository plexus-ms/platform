name: plexus-ci

# Reusable CI for Plexus apps: biome → typecheck → test → build & push
# a container image to the caller's GHCR namespace, tagged with the git SHA.

on:
  workflow_call:
    inputs:
      app:
        description: Workspace app name (pnpm filter + mise dir under apps/).
        required: true
        type: string
      image-name:
        description: Image name under the caller's GHCR org. Defaults to `app`.
        required: false
        type: string
        default: ''
      dockerfile:
        description: Dockerfile path. Defaults to apps/<app>/Dockerfile.
        required: false
        type: string
        default: ''
      push:
        description: Build and push the image (set false for PRs).
        required: false
        type: boolean
        default: true
    outputs:
      image:
        description: Full image ref that was built (name:sha).
        value: ${{ jobs.image.outputs.image }}

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: mise :biome
      - run: mise :verify

  image:
    needs: check
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
        with:
          install: false
      - id: toolchain
        run: |
          eval "$(mise env -s bash)"
          {
            echo 'build-args<<EOF'
            if [ -n "${NODE_VERSION:-}" ]; then echo "NODE_VERSION=$NODE_VERSION"; fi
            if [ -n "${PNPM_VERSION:-}" ]; then echo "PNPM_VERSION=$PNPM_VERSION"; fi
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - id: meta
        # Image lives under the CALLER's org so the repo's own GITHUB_TOKEN can
        # push it (no cross-org PAT). Tenant app → tenant-org registry.
        run: |
          name='${{ inputs.image-name }}'
          [ -n "$name" ] || name='${{ inputs.app }}'
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$owner/$name:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('apps/{0}/Dockerfile', inputs.app) }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          build-args: |
            APP=${{ inputs.app }}
            ${{ steps.toolchain.outputs.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
