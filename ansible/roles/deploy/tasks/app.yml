---
- name: "{{ app.name }} | resolve app dir"
  ansible.builtin.set_fact:
    app_dir: "{{ plexus_deploy_root }}/{{ app.name }}"

- name: "{{ app.name }} | create app dir"
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ plexus_deploy_user }}"
    group: "{{ plexus_deploy_user }}"
    mode: "0750"

# compose.yaml comes from this monorepo's apps/<name>/ (single source of
# truth) — the operator's checkout is the reproducible reference. It is the
# app's entire host-side surface: services, healthcheck, and (for stateful
# apps) the one-shot migrate service the deploy verb invokes.
- name: "{{ app.name }} | place deploy artifacts from the repo"
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../apps/{{ app.name }}/docker/{{ item }}"
    dest: "{{ app_dir }}/{{ item }}"
    owner: "{{ plexus_deploy_user }}"
    mode: "0644"
  loop:
    - compose.yaml
  loop_control:
    label: "{{ item }}"

# Restore baseline: only seed IMAGE when absent so a live CI deploy is never clobbered.
- name: "{{ app.name }} | seed .env with the restore image"
  ansible.builtin.copy:
    dest: "{{ app_dir }}/.env"
    content: "IMAGE={{ app.image }}\n"
    owner: "{{ plexus_deploy_user }}"
    mode: "0640"
    force: false

# Non-secret platform bindings (§ 5.4, § 7.2 PLX): the host port assigned in
# the tenant's inventory, interpolated by compose as ${PLEXUS_APP_PORT}. The
# platform playbook is this file's only writer and always overwrites — the
# inventory is the truth.
- name: "{{ app.name }} | write platform.env with the host-port binding"
  ansible.builtin.copy:
    dest: "{{ app_dir }}/platform.env"
    content: "PLEXUS_APP_PORT={{ app.port }}\n"
    owner: "{{ plexus_deploy_user }}"
    group: "{{ plexus_deploy_user }}"
    mode: "0640"

# Substance stays on the host: per-app secrets from the tenant's `app.secrets` dict
# (fed from 1Password via `op run`), injected into the container by the app's compose
# `env_file`. Ownership is deliberately split — the deploy verb owns and
# clobbers .env, the platform playbook owns secrets.env, and neither ever
# writes the other's file.
- name: "{{ app.name }} | place secrets.env"
  ansible.builtin.copy:
    dest: "{{ app_dir }}/secrets.env"
    content: |
      {% for key, value in app.secrets.items() %}
      {{ key }}={{ value }}
      {% endfor %}
    owner: "{{ plexus_deploy_user }}"
    group: "{{ plexus_deploy_user }}"
    mode: "0600"
  when: app.secrets is defined
  no_log: true

- name: "{{ app.name }} | log in to GHCR as the deploy user"
  ansible.builtin.command:
    cmd: "docker login ghcr.io -u {{ plexus_ghcr_user }} --password-stdin"
    stdin: "{{ plexus_ghcr_token }}"
  become_user: "{{ plexus_deploy_user }}"
  when: plexus_ghcr_token | length > 0
  no_log: true
  changed_when: false

# Runs as the deploy user so a private registry works: that's where the GHCR
# login above put the credentials, and it's the same user the CI deploy verb
# uses — playbook runs and CI deploys pull with one identity.
- name: "{{ app.name }} | pull + start"
  when: plexus_up | bool
  become_user: "{{ plexus_deploy_user }}"
  block:
    # --env-file replaces compose's implicit .env lookup, so both files are
    # passed explicitly: .env (deploy-verb-owned image ref) + platform.env
    # (playbook-owned bindings). Same wiring as the deploy verb's.
    - name: "{{ app.name }} | docker compose pull"
      ansible.builtin.command:
        cmd: docker compose --env-file .env --env-file platform.env pull
        chdir: "{{ app_dir }}"
      changed_when: false
    - name: "{{ app.name }} | docker compose up -d"
      ansible.builtin.command:
        cmd: docker compose --env-file .env --env-file platform.env up -d
        chdir: "{{ app_dir }}"
      register: compose_up
      changed_when: "'Started' in compose_up.stderr or 'Recreated' in compose_up.stderr or 'Created' in compose_up.stderr"
  rescue:
    - name: "{{ app.name }} | image not pullable yet (expected before first CI push)"
      ansible.builtin.debug:
        msg: >-
          {{ app.name }}: image {{ app.image }} not available yet.
          Host is provisioned; run the CI deploy (or push to main) to bring it up.
