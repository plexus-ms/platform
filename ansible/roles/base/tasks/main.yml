---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name: "{{ plexus_base_packages }}"
    state: present

- name: Set timezone to UTC
  community.general.timezone:
    name: Etc/UTC

# ── unprivileged deploy user ────────────────────────────────────────────────
- name: Create the deploy user
  ansible.builtin.user:
    name: "{{ plexus_deploy_user }}"
    shell: /bin/bash
    create_home: true

- name: Authorize the deploy key (CI runs the deploy verb as this user)
  ansible.posix.authorized_key:
    user: "{{ plexus_deploy_user }}"
    key: "{{ plexus_deploy_pubkey }}"
    state: present
  when: plexus_deploy_pubkey | length > 0

# ── SSH hardening (key-only) ────────────────────────────────────────────────
- name: Harden sshd
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    validate: "sshd -t -f %s"
  loop:
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
  notify: Restart ssh

# ── firewall ────────────────────────────────────────────────────────────────
- name: Allow SSH/HTTP/HTTPS through ufw
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["22", "80", "443"]

- name: Default-deny inbound and enable ufw
  community.general.ufw:
    state: enabled
    default: deny
    direction: incoming

# ── unattended security upgrades ────────────────────────────────────────────
- name: Enable unattended-upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
