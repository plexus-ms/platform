namespace: plexus             # not "plexus-ms": collection namespaces forbid hyphens
name: platform
version: 0.22.0                # mirrors the release-train tag — written by the umbrella ship task.
                              # SCM installs record this version (a moved git tag alone is a silent
                              # no-op on reinstall); ansible-galaxy reinstalls on any DIFFERENT
                              # version, so the one-time drop from the decoupled 5.x line was safe
readme: README.md
authors:
  - David Julian Albers
description: >-
  Shared Plexus tenant-host roles: base hardening, Docker engine + compose,
  Caddy install (caddy) and routing (ingress), per-app deploy, Grafana Alloy
  observability agent.
license:
  - GPL-3.0-or-later
repository: https://github.com/plexus-ms/platform
tags: [infrastructure]
dependencies:
  community.general: ">=9.0.0"
  ansible.posix: ">=1.5.0"
