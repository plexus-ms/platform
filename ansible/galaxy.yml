authors:
  - David Albers
description: >-
  Shared Plexus tenant-host roles: base hardening, Docker engine + compose,
  Caddy ingress, per-app deploy, Grafana Alloy observability agent.
license:
  - MIT
repository: https://github.com/plexus-ms/itops
tags: [infrastructure]
dependencies:
  community.general: ">=9.0.0"
  ansible.posix: ">=1.5.0"
