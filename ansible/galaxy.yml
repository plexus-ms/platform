namespace: plexus             # not "plexus-ms": collection namespaces forbid hyphens
name: platform
version: 5.2.0                # bump on EVERY change under ansible/ — SCM installs record this
                              # version, so a moved git tag alone is a silent no-op on reinstall
readme: README.md
authors:
  - David Julian Albers
description: >-
  Shared Plexus tenant-host roles: base hardening, Docker engine + compose,
  Caddy install (caddy) and routing (ingress), per-app deploy, Grafana Alloy
  observability agent.
license:
  - GPL-3.0-or-later
repository: https://github.com/plexus-ms/platform
tags: [infrastructure]
dependencies:
  community.general: ">=9.0.0"
  ansible.posix: ">=1.5.0"
