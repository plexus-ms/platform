namespace: plexus_ms          # collection namespaces forbid hyphens — this is NOT a typo of the org name
name: itops
version: 1.0.0                # bump on EVERY change under ansible/ — SCM installs record this
                              # version, so a moved git tag alone is a silent no-op on reinstall
